name: Build Signed Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add and Sync Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Patch Android SDK Version to 35
        run: |
          if [ -f android/variables.gradle ]; then
            sed -i 's/compileSdkVersion.*/compileSdkVersion = 35/g' android/variables.gradle
            sed -i 's/targetSdkVersion.*/targetSdkVersion = 35/g' android/variables.gradle
          fi

      - name: Build Unsigned Release APK
        run: |
          cd android && ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: AfterGlow-App
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
